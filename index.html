<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComplianceGuard.ai | Protect Your Business from ADA Lawsuits</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .glowing-border {
            position: relative;
            z-index: 0;
        }
        .glowing-border::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #2563EB, #3B82F6, #2563EB);
            border-radius: 1rem;
            z-index: -1;
            animation: rotate 3s linear infinite;
        }
        @keyframes rotate {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
    <!-- Error Trap -->
    <script>
      window.addEventListener('error', function(e) {
        var errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:red;color:white;padding:20px;z-index:9999;font-family:monospace;white-space:pre-wrap;';
        errorDiv.textContent = 'App Error: ' + e.message + '\nFile: ' + e.filename + ':' + e.lineno;
        document.body.appendChild(errorDiv);
      });
    </script>
    <!-- Gumroad Overlay Integration -->
    <script src="https://gumroad.com/js/gumroad.js" defer></script>
</head>
<body class="bg-white text-slate-900 overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
</body>
</html>
